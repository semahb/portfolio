<header>
  <nav>
    <a href="#hero" class="logo" data-testid="nav-logo">Bader<span>.</span></a>
    <ul class="nav-links">
      @for (link of navLinks; track link.href) {
        <li><a [href]="link.href" data-testid="nav-link">{{ link.label | translate }}</a></li>
      }
    </ul>
    <div class="nav-r">
      <button class="tbtn" (click)="toggleTheme()" title="Toggle theme" data-testid="nav-theme-toggle"></button>
      <app-lang-switcher></app-lang-switcher>
      <a [href]="hireEmailHref" class="hire-btn" data-testid="nav-hire-btn">{{ 'NAV.HIRE' | translate }}</a>
      <div class="mob-tog"
           [class.open]="isMobileMenuOpen"
           (click)="toggleMobileMenu()"
           data-testid="nav-mobile-toggle"
           aria-label="Toggle navigation menu"
           [attr.aria-expanded]="isMobileMenuOpen">
        <span></span><span></span><span></span>
      </div>
    </div>
  </nav>
  @if (isMobileMenuOpen) {
    <div class="mob-menu" (click)="toggleMobileMenu()" data-testid="nav-mobile-menu">
      <ul class="mob-links" (click)="$event.stopPropagation()" data-testid="nav-mobile-links">
        @for (link of navLinks; track link.href) {
          <li><a [href]="link.href" (click)="toggleMobileMenu()" [attr.data-testid]="'mob-' + stripHash(link.href)">{{ link.label | translate }}</a></li>
        }
        <li><a [href]="hireEmailHref" (click)="toggleMobileMenu()" data-testid="mob-hire">{{ 'NAV.HIRE' | translate }}</a></li>
      </ul>
    </div>
  }
</header>
