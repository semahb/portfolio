<section id="process">
  <div class="slabel">How I Work</div>
  <h2 class="stitle">From brief to <em>live</em> — 4 steps</h2>
  <p class="ssub">
    A clear, repeatable process that keeps you informed and in control at every stage.
  </p>
  <div class="pgrid2">
    @for (step of processSteps; let i = $index; track step.number) {
      <div class="pstep r" [ngClass]="'d' + (i + 1)" [attr.data-testid]="'process-step-' + step.number">
        <div class="psnum">{{ step.number }}</div>
        <div class="pstitle">{{ step.title }}</div>
        <p class="psdesc">{{ step.description }}</p>
      </div>
    }
  </div>
</section>
