<section id="what">
  <div class="slabel">Services</div>
  <h2 class="stitle">What I can do <em>for you</em></h2>
  <p class="ssub">
    Three ways to work together — pick what fits your situation.
  </p>
  <div class="what-grid">
    @for (card of serviceCards; let i = $index; track card.name) {
      <div class="wcard r" [ngClass]="'d' + (i + 1)" [attr.data-testid]="'service-card-' + card.name">
        <div class="wicon">{{ card.icon }}</div>
        <div class="wname">{{ card.name }}</div>
        <p class="wdesc">{{ card.description }}</p>
        <div class="wtags">
          @for (tag of card.tags; track tag) {
            <span class="wtag">{{ tag }}</span>
          }
        </div>
      </div>
    }
  </div>
</section>
