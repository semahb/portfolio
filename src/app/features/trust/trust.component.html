<div id="trust">
  <span class="tlabel">{{ 'TRUST.LABEL' | translate }}</span>
  <div class="tchips">
    @for (chip of trustChips; let i = $index; track chip.label) {
      <span class="tc" [attr.data-testid]="'trust-chip-' + chip.label">{{ (getChipKey(i)) | translate }}</span>
    }
  </div>
</div>
